<h1>Find Schemes for You</h1>

<p>
अपनी स्थिति चुनें और देखें कि कौन-सी सरकारी योजनाएँ आपके लिए उपयोगी हो सकती हैं।
</p>

<select id="category">

<option value="">Select Category</option>

<option value="farmer">Farmer</option>

<option value="student">Student</option>

<option value="women">Women</option>

<option value="business">Business</option>

<option value="senior">Senior Citizen</option>

</select>

<button onclick="findScheme()">Find Schemes</button>

<div id="result" style="margin-top:20px;"></div>

</section>

<script>

function findScheme(){

let category=document.getElementById("category").value;
let result=document.getElementById("result");

if(category==="farmer"){

result.innerHTML="PM Kisan Samman Nidhi<br>PM Fasal Bima Yojana";

}

else if(category==="student"){

result.innerHTML="National Scholarship Scheme<br>Skill India Mission";

}

else if(category==="women"){

result.innerHTML="Sukanya Samriddhi Yojana<br>Stand Up India Scheme";

}

else if(category==="business"){

result.innerHTML="PM Mudra Yojana<br>Startup India Scheme";

}

else if(category==="senior"){

result.innerHTML="Atal Pension Yojana";

}

else{

result.innerHTML="Please select a category";

}

}

</script>
