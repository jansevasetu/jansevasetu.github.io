<section class="section">

<h1>Filter Government Schemes</h1>

<select id="filter">

<option value="all">All</option>

<option value="farmer">Farmer</option>

<option value="business">Business</option>

<option value="health">Health</option>

<option value="women">Women</option>

</select>

<div id="schemes">

<div class="scheme farmer">
PM Kisan Samman Nidhi
</div>

<div class="scheme farmer">
PM Fasal Bima Yojana
</div>

<div class="scheme business">
PM Mudra Yojana
</div>

<div class="scheme business">
Startup India Scheme
</div>

<div class="scheme health">
Ayushman Bharat
</div>

<div class="scheme women">
Sukanya Samriddhi Yojana
</div>

</div>

</section>

<script>

document.getElementById("filter").addEventListener("change",function(){

let value=this.value;
let schemes=document.querySelectorAll(".scheme");

schemes.forEach(function(s){

if(value==="all" || s.classList.contains(value)){

s.style.display="block";

}

else{

s.style.display="none";

}

});

});

</script>
