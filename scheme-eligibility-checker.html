<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scheme Eligibility Checker | JanSevaSetu</title>

<link rel="stylesheet" href="/assets/style.css">

</head>

<body>

<header>

<h1>JanSevaSetu</h1>
<p>Check Government Scheme Eligibility</p>

</header>

<nav>

<a href="/">Home</a>
<a href="/schemes/">All Schemes</a>
<a href="/guides/">Citizen Guides</a>

</nav>

<section class="section">

<h1>Check Schemes You May Be Eligible For</h1>

<label>Category</label>

<select id="category">

<option value="">Select</option>
<option value="farmer">Farmer</option>
<option value="student">Student</option>
<option value="women">Women</option>
<option value="business">Business</option>

</select>

<label>Age</label>

<input type="number" id="age" placeholder="Enter age">

<button onclick="checkScheme()">Check Eligibility</button>

<div id="result" style="margin-top:20px;"></div>

</section>

<script>

function checkScheme(){

let category=document.getElementById("category").value;
let age=document.getElementById("age").value;
let result=document.getElementById("result");

let schemes=[];

if(category==="farmer"){

schemes.push("PM Kisan Samman Nidhi","PM Fasal Bima Yojana");

}

if(category==="student"){

schemes.push("National Scholarship Scheme","Skill India Mission");

}

if(category==="women"){

schemes.push("Sukanya Samriddhi Yojana","Stand Up India Scheme");

}

if(category==="business"){

schemes.push("PM Mudra Yojana","Startup India Scheme");

}

if(age>=60){

schemes.push("Atal Pension Yojana");

}

if(schemes.length===0){

result.innerHTML="No schemes found for selected criteria.";

}

else{

result.innerHTML="You may be eligible for:<br><br>"+schemes.join("<br>");

}

}

</script>

<footer>

<p>© JanSevaSetu</p>

</footer>

</body>

</html>
