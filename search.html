<section class="section">

<input type="text" id="searchInput" placeholder="Type scheme name..." onkeyup="searchScheme()" style="width:100%;padding:12px;font-size:16px;">

<div id="results" style="margin-top:20px;"></div>

</section>

<script>

const schemes = [

{name:"PM Kisan Samman Nidhi",link:"/schemes/pm-kisan.html"},

{name:"PM Awas Yojana",link:"/schemes/pm-awas-yojana.html"},

{name:"Ayushman Bharat",link:"/schemes/ayushman-bharat.html"},

{name:"PM Mudra Yojana",link:"/schemes/pm-mudra-yojana.html"},

{name:"PM Jan Dhan Yojana",link:"/schemes/pm-jan-dhan-yojana.html"}

];

function searchScheme(){

let input=document.getElementById("searchInput").value.toLowerCase();

let results=document.getElementById("results");

results.innerHTML="";

schemes.forEach(function(s){

if(s.name.toLowerCase().includes(input)){

results.innerHTML+=`<div class="card"><a href="${s.link}">${s.name}</a></div>`;

}

});

}

</script>
